name: Architecture check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  forbidden-patterns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Per ARCHITECTURE.md: light-DOM only. No shadow DOM in components.
      - name: Forbid attachShadow / shadowrootmode in components
        run: |
          set -e
          matches=$(grep -rn "attachShadow\|shadowrootmode" packages/kitroom/src/ || true)
          if [ -n "$matches" ]; then
            echo "Forbidden shadow-DOM pattern (light DOM only — see ARCHITECTURE.md):"
            echo "$matches"
            exit 1
          fi
