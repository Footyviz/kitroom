<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"><style id="__fb-sans">html,body,div,span,p,h1,h2,h3,h4,h5,h6,section,article,header,footer,main,aside,nav,button,input,textarea,select,label,li,td,th,a{font-family:system-ui, -apple-system, Segoe UI, sans-serif}.mono,code,pre,kbd,samp,[class*="mono"]{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}</style></head>
<body>
<div class="card" style="padding:24px 28px;gap:14px">
  <div class="meta">Viz frame · how a chart is chromed</div>
  <div style="background:var(--neutral-1000);border-radius:4px;padding:16px;color:#FAFAF7;max-width:520px;display:flex;flex-direction:column;gap:10px">
    <div class="row" style="justify-content:space-between;align-items:center">
      <div class="col" style="gap:2px">
        <div class="mono" style="font-size:10px;color:#8F8B7E;letter-spacing:.08em;text-transform:uppercase">Expected Threat · 73'</div>
        <div style="font-family:var(--font-sans);font-size:14px;font-weight:500">Arsenal build-up · left channel</div>
      </div>
      <div style="width:6px;height:6px;background:#C6F24E;border-radius:999px"></div>
    </div>
    <!-- fake pitch -->
    <svg viewBox="0 0 400 160" style="width:100%;height:140px">
      <rect x="2" y="2" width="396" height="156" stroke="#26251F" fill="none"/>
      <line x1="200" y1="2" x2="200" y2="158" stroke="#26251F"/>
      <circle cx="200" cy="80" r="24" stroke="#26251F" fill="none"/>
      <!-- pass trail -->
      <path d="M 40 130 Q 120 70, 220 90 T 360 60" stroke="#C6F24E" stroke-width="1.6" fill="none" opacity=".9"/>
      <circle cx="40" cy="130" r="3" fill="#C6F24E"/>
      <circle cx="220" cy="90" r="3" fill="#C6F24E"/>
      <circle cx="360" cy="60" r="4" fill="#C6F24E"/>
      <circle cx="360" cy="60" r="7" stroke="#C6F24E" fill="none" opacity=".5"/>
    </svg>
    <div class="mono" style="font-size:10px;color:#8F8B7E">xT +0.08 · 3 passes · 72m advance</div>
  </div>
</div>
</body></html>
