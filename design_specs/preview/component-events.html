<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"><style id="__fb-sans">html,body,div,span,p,h1,h2,h3,h4,h5,h6,section,article,header,footer,main,aside,nav,button,input,textarea,select,label,li,td,th,a{font-family:system-ui, -apple-system, Segoe UI, sans-serif}.mono,code,pre,kbd,samp,[class*="mono"]{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}</style></head>
<body>
<div class="card" style="padding:24px 28px;gap:12px">
  <div class="meta">Event tick · play-by-play</div>
  <div style="display:flex;flex-direction:column;gap:14px;max-width:460px">
    <div style="display:grid;grid-template-columns:42px 1fr;gap:14px;align-items:flex-start">
      <div class="mono" style="font-size:12px;color:var(--fg-muted);padding-top:2px">73'</div>
      <div style="padding-left:16px;border-left:1px solid var(--border);padding-bottom:4px">
        <div style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;background:var(--positive);border-radius:999px;margin-left:-20px"></span><span style="font-family:var(--font-sans);font-size:14px;font-weight:500">Goal · Rice</span></div>
        <div style="font-family:var(--font-sans);font-size:12px;color:var(--fg-muted);margin-top:4px">Arsenal 2 – 1. Assist Saka. <span class="mono">xG 0.14</span></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:42px 1fr;gap:14px;align-items:flex-start">
      <div class="mono" style="font-size:12px;color:var(--fg-muted);padding-top:2px">68'</div>
      <div style="padding-left:16px;border-left:1px solid var(--border);padding-bottom:4px">
        <div style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;background:var(--warning);border-radius:999px;margin-left:-20px"></span><span style="font-family:var(--font-sans);font-size:14px;font-weight:500">Yellow · Caicedo</span></div>
        <div style="font-family:var(--font-sans);font-size:12px;color:var(--fg-muted);margin-top:4px">Tactical foul, 32m from goal.</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:42px 1fr;gap:14px;align-items:flex-start">
      <div class="mono" style="font-size:12px;color:var(--fg-muted);padding-top:2px">61'</div>
      <div style="padding-left:16px;border-left:1px solid var(--border);padding-bottom:4px">
        <div style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;background:var(--info);border-radius:999px;margin-left:-20px"></span><span style="font-family:var(--font-sans);font-size:14px;font-weight:500">VAR review</span></div>
        <div style="font-family:var(--font-sans);font-size:12px;color:var(--fg-muted);margin-top:4px">Possible penalty. No action taken.</div>
      </div>
    </div>
  </div>
</div>
</body></html>
