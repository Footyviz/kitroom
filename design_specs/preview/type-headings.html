<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"><style id="__fb-sans">html,body,div,span,p,h1,h2,h3,h4,h5,h6,section,article,header,footer,main,aside,nav,button,input,textarea,select,label,li,td,th,a{font-family:system-ui, -apple-system, Segoe UI, sans-serif}.mono,code,pre,kbd,samp,[class*="mono"]{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}</style></head>
<body>
<div class="card" style="gap:18px;padding:24px 28px">
  <div class="meta">Heading scale · Geist sans</div>
  <div style="display:grid;grid-template-columns:68px 1fr;gap:12px 18px;align-items:baseline">
    <div class="kbd">H1 / 40</div>
    <div style="font-family:var(--font-sans);font-weight:600;font-size:40px;line-height:1.1;letter-spacing:-0.02em;color:var(--fg)">Match Centre</div>
    <div class="kbd">H2 / 28</div>
    <div style="font-family:var(--font-sans);font-weight:600;font-size:28px;line-height:1.25;letter-spacing:-0.01em;color:var(--fg)">Expected goals timeline</div>
    <div class="kbd">H3 / 20</div>
    <div style="font-family:var(--font-sans);font-weight:500;font-size:20px;line-height:1.25;letter-spacing:-0.01em;color:var(--fg)">First-half shot map</div>
    <div class="kbd">H4 / 16</div>
    <div style="font-family:var(--font-sans);font-weight:500;font-size:16px;line-height:1.3;color:var(--fg)">Pass network · 15-min window</div>
  </div>
</div>
</body></html>
