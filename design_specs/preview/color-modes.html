<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"><style id="__fb-sans">html,body,div,span,p,h1,h2,h3,h4,h5,h6,section,article,header,footer,main,aside,nav,button,input,textarea,select,label,li,td,th,a{font-family:system-ui, -apple-system, Segoe UI, sans-serif}.mono,code,pre,kbd,samp,[class*="mono"]{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}</style></head>
<body>
<div class="card" style="padding:0;gap:0;min-height:200px;display:grid;grid-template-columns:1fr 1fr">
  <div style="background:var(--neutral-50);padding:22px 24px;display:flex;flex-direction:column;gap:10px;border-right:1px solid var(--neutral-200)">
    <div style="font-family:var(--font-sans);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#6B6860;font-weight:500">Light mode</div>
    <div style="color:#1A1A18;font-family:var(--font-sans);font-weight:600;font-size:22px;letter-spacing:-0.01em">Arsenal 2 – 1 Chelsea</div>
    <div style="color:#6B6860;font-family:var(--font-mono);font-size:12px">73' · second half</div>
    <div style="margin-top:6px;display:inline-flex;align-items:center;gap:6px;align-self:flex-start;background:#C6F24E;color:#0A1300;padding:6px 12px;border-radius:999px;font-family:var(--font-mono);font-size:11px;font-weight:500"><span style="width:6px;height:6px;background:#0A1300;border-radius:999px"></span>LIVE</div>
  </div>
  <div style="background:#080807;padding:22px 24px;display:flex;flex-direction:column;gap:10px">
    <div style="font-family:var(--font-sans);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#8F8B7E;font-weight:500">Dark mode</div>
    <div style="color:#FAFAF7;font-family:var(--font-sans);font-weight:600;font-size:22px;letter-spacing:-0.01em">Arsenal 2 – 1 Chelsea</div>
    <div style="color:#BDB9AC;font-family:var(--font-mono);font-size:12px">73' · second half</div>
    <div style="margin-top:6px;display:inline-flex;align-items:center;gap:6px;align-self:flex-start;background:#C6F24E;color:#0A1300;padding:6px 12px;border-radius:999px;font-family:var(--font-mono);font-size:11px;font-weight:500"><span style="width:6px;height:6px;background:#0A1300;border-radius:999px"></span>LIVE</div>
  </div>
</div>
</body></html>
