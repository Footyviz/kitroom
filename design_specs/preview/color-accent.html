<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"><style id="__fb-sans">html,body,div,span,p,h1,h2,h3,h4,h5,h6,section,article,header,footer,main,aside,nav,button,input,textarea,select,label,li,td,th,a{font-family:system-ui, -apple-system, Segoe UI, sans-serif}.mono,code,pre,kbd,samp,[class*="mono"]{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}</style></head>
<body>
<div class="card" style="padding:28px 32px;gap:22px">
  <div class="meta">Accent · Straw yellow · #E8BE56 · derived from brand mark</div>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:28px;align-items:stretch">

    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="height:120px;border-radius:8px;background:#E8BE56;position:relative;overflow:hidden">
        <span class="mono" style="position:absolute;bottom:10px;left:12px;font-size:10px;color:#1A1405">#E8BE56 · Straw</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
        <div style="height:42px;border-radius:4px;background:#F6E6B3;display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:9px;color:#1A1405">soft</div>
        <div style="height:42px;border-radius:4px;background:#E8BE56;display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:9px;color:#1A1405">base</div>
        <div style="height:42px;border-radius:4px;background:#9C7A1E;display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:9px;color:#F5EFE0">dim</div>
        <div style="height:42px;border-radius:4px;background:#1A1405;display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:9px;color:#E8BE56">ink</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;justify-content:center">
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;background:#FAFAF7;border:1px solid #DDDAD0">
        <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;background:#E8BE56;color:#1A1405;font-family:var(--font-mono);font-size:10px;font-weight:500"><span style="width:5px;height:5px;background:#1A1405;border-radius:999px"></span>LIVE · 73′</span>
        <span style="font-family:var(--font-sans);font-size:13px;color:#1A1A18">Live chip</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;background:#FAFAF7;border:1px solid #DDDAD0">
        <button style="padding:7px 14px;border-radius:14px;border:none;background:#E8BE56;color:#1A1405;font-family:var(--font-sans);font-size:13px;font-weight:500;cursor:pointer">Primary CTA</button>
        <span style="font-family:var(--font-sans);font-size:13px;color:#1A1A18">Button</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;background:#080807;border:1px solid #26251F">
        <span style="font-family:var(--font-mono);font-size:22px;color:#E8BE56;font-weight:500">1.84</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:#8F8B7E;letter-spacing:0.08em;text-transform:uppercase">xG · active</span>
      </div>
    </div>
  </div>
  <div class="mono" style="font-size:10px;color:var(--fg-muted);max-width:640px">The accent signals <em>now</em>: live, selected, primary-series. It should never be decorative or structural — if you can remove it without losing meaning, do.</div>
</div>
</body></html>
